apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubi-operator
  namespace: kube-system
  labels:
    app: kubi-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubi-operator
  template:
    metadata:
      labels:
        app: kubi-operator
    spec:
      serviceAccountName: kubi-user
      containers:
        - name: kubi-operator
          image: <kubi-operator-image>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          volumeMounts:
            - name: kubi-netpol-template
              mountPath: "/etc/kubi/netpol"
              readOnly: true
#          volumeMounts:
#            - name: kubi-tls
#              mountPath: "/var/run/secrets/certs"
#              readOnly: true
          envFrom:
            - configMapRef:
                name: kubi-config
          env:
            - name: LDAP_PASSWD
              valueFrom:
                secretKeyRef:
                  name: kubi-secret
                  key: ldap_passwd
            - name: NETPOL_TEMPLATE_PATH
              value: "/etc/kubi/netpol/networkpolicytemplate.yaml"
      volumes:
      - name: kubi-netpol-template
        configMap:
          name: kubi-netpol-template
#      volumes:
#        - name: kubi-tls
#          secret:
#            secretName: kubi